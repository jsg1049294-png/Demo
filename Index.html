<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meine App - GitHub Browser</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { margin: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    #iframe-container { display: none; height: 100vh; width: 100vw; flex-direction: column; }
    .chrome-bar { 
      background: #f1f1f1; 
      padding: 8px 12px; 
      display: flex; 
      align-items: center; 
      gap: 8px; 
      border-bottom: 1px solid #ddd;
    }
    .url-bar { 
      flex: 1; 
      background: white; 
      border: 1px solid #ccc; 
      border-radius: 9999px; 
      padding: 8px 16px; 
      font-size: 14px;
    }
    iframe { flex: 1; border: none; width: 100%; }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">Willkommen zurück</h1>
        <p class="text-gray-600 mt-2">Melde dich an, um GitHub zu öffnen</p>
      </div>

      <div class="space-y-4 mb-8">
        <button onclick="login()" 
                class="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-300 hover:border-gray-400 text-gray-700 font-medium py-4 px-6 rounded-2xl transition-all">
          <img src="https://www.google.com/images/branding/googleg/1x/googleg_standard_color_128dp.png" alt="Google" class="w-6 h-6">
          <span>Mit Google anmelden</span>
        </button>

        <button onclick="login()" 
                class="w-full flex items-center justify-center gap-3 bg-black text-white font-medium py-4 px-6 rounded-2xl hover:bg-gray-900 transition-all">
          <i class="fa-brands fa-apple text-3xl"></i>
          <span>Mit Apple anmelden</span>
        </button>

        <button onclick="login()" 
                class="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-300 hover:border-gray-400 text-gray-700 font-medium py-4 px-6 rounded-2xl transition-all">
          <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" alt="Microsoft" class="w-6 h-6">
          <span>Mit Microsoft anmelden</span>
        </button>
      </div>

      <form id="email-form" class="space-y-4">
        <input type="email" id="email" 
               class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-purple-500"
               placeholder="deine@email.de" required>
        <input type="password" id="password" 
               class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:border-purple-500"
               placeholder="••••••••" required>
        <button type="submit"
                class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-semibold py-4 rounded-2xl hover:brightness-110 transition-all">
          Mit E-Mail anmelden
        </button>
      </form>
    </div>
  </div>

  <!-- GitHub Browser -->
  <div id="iframe-container">
    <div class="chrome-bar">
      <div class="flex gap-1">
        <button onclick="goBack()" class="w-9 h-9 hover:bg-gray-200 rounded-xl flex items-center justify-center"><i class="fa-solid fa-arrow-left"></i></button>
        <button onclick="goForward()" class="w-9 h-9 hover:bg-gray-200 rounded-xl flex items-center justify-center"><i class="fa-solid fa-arrow-right"></i></button>
        <button onclick="reloadPage()" class="w-9 h-9 hover:bg-gray-200 rounded-xl flex items-center justify-center"><i class="fa-solid fa-rotate-right"></i></button>
      </div>

      <div class="url-bar flex items-center gap-2">
        <i class="fa-solid fa-lock text-green-600"></i>
        <input id="url-input" type="text" value="https://github.com" 
               class="flex-1 bg-transparent outline-none" 
               onkeypress="if(event.key === 'Enter') loadUrl()">
      </div>

      <button onclick="logout()" class="px-4 text-red-600 hover:text-red-700">
        <i class="fa-solid fa-right-from-bracket"></i>
      </button>
    </div>
    <iframe id="main-iframe" src="https://github.com"></iframe>
  </div>

  <script>
    function login() {
      alert("✅ Erfolgreich angemeldet (Demo)");
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('iframe-container').style.display = 'flex';
    }

    document.getElementById('email-form').addEventListener('submit', function(e) {
      e.preventDefault();
      login();
    });

    function loadUrl() {
      let url = document.getElementById('url-input').value.trim();
      if (!url.startsWith('http')) url = 'https://' + url;
      document.getElementById('main-iframe').src = url;
    }

    function goBack() {
      document.getElementById('main-iframe').contentWindow.history.back();
    }
    function goForward() {
      document.getElementById('main-iframe').contentWindow.history.forward();
    }
    function reloadPage() {
      document.getElementById('main-iframe').contentWindow.location.reload();
    }

    function logout() {
      document.getElementById('iframe-container').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('main-iframe').src = '';
    }
  </script>
</body>
</html>
